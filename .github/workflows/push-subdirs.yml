name: CI/CD push subdirs back & front
on:
  push:
    branches:
      - "main"
      - "feat/ci-cd"
      - ".github/workflows/push-subdirs.yml"
      - ".github/workflows/back.yml"
      - ".github/workflows/front.yml"
      - "back/**"
      - "front/**"

jobs:
  push-back:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Copy back deploy action
        run: |
          mkdir ./back/.github && mkdir ./back/.github/workflows
          cp ./.github/workflows/back.yml ./back/.github/workflows/back.yml
      - name: Push to back branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: back
          FOLDER: back
          MESSAGE: "deploy back"
          GITHUB_TOKEN: ${{ secrets.PAT }}
  push-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Copy front deploy action
        run: |
          mkdir ./front/.github && mkdir ./front/.github/workflows
          cp ./.github/workflows/front.yml ./front/.github/workflows/front.yml
      - name: Push to back branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: front
          FOLDER: front
          MESSAGE: "deploy front"
          GITHUB_TOKEN: ${{ secrets.PAT }}
